<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-semibold fs-4 d-flex align-items-center gap-2" th:href="@{/}">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#e83e8c" viewBox="0 0 24 24">
                <path d="M12 21s-6.7-4.35-9.33-7.1C.6 11.73.5 9.28 2.3 7.6c1.74-1.64 4.4-1.52 6.02.25L12 11.6l3.68-3.75c1.62-1.77 4.28-1.9 6.02-.25 1.8 1.68 1.7 4.13-.37 6.3C18.7 16.65 12 21 12 21z"/>
            </svg>
            Pawsy
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <ul class="navbar-nav me-auto gap-lg-3">

                <li class="nav-item">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/about}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                        </svg>
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/pets}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M4.5 9A2.5 2.5 0 117 6.5 2.5 2.5 0 014.5 9zm6-3A2.5 2.5 0 1113 3.5 2.5 2.5 0 0110.5 6zm6 3A2.5 2.5 0 1119 6.5 2.5 2.5 0 0116.5 9zM12 11c-3.5 0-6 2.5-6 4.5S8 20 12 20s6-1.5 6-4.5S15.5 11 12 11z"/>
                        </svg>
                        Pets
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/shelters}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M12 3l9 7v11h-6v-6H9v6H3V10l9-7z"/>
                        </svg>
                        Shelters
                    </a>
                </li>

            </ul>

            <ul class="navbar-nav align-items-center gap-2">

                <li sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-danger px-3 pawsy-btn d-flex align-items-center gap-2" th:href="@{/login}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M10 17l5-5-5-5v3H3v4h7v3zM19 3h-6v2h6v14h-6v2h6a2 2 0 002-2V5a2 2 0 00-2-2z"/>
                        </svg>
                        Login
                    </a>
                </li>

                <li sec:authorize="!isAuthenticated()">
                    <a class="btn btn-danger px-3 pawsy-btn d-flex align-items-center gap-2" th:href="@{/register}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M15 14c2.7 0 5 2.3 5 5v1H4v-1c0-2.7 2.3-5 5-5h6zm-3-2a4 4 0 100-8 4 4 0 000 8z"/>
                        </svg>
                        Register
                    </a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2 fw-medium" data-bs-toggle="dropdown">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-4.4 0-8 3.6-8 8h16c0-4.4-3.6-8-8-8z"/>
                        </svg>
                        <span sec:authentication="name"></span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li class="dropdown-item small text-muted">
                            <span sec:authentication="principal.authorities"></span>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>

            </ul>

        </div>
    </div>
</nav>

</body>
</html>
