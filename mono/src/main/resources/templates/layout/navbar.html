<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-semibold fs-4 d-flex align-items-center gap-2" th:href="@{/}">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#e83e8c" viewBox="0 0 24 24">
                <path d="M12 21s-6.7-4.35-9.33-7.1C.6 11.73.5 9.28 2.3 7.6c1.74-1.64 4.4-1.52 6.02.25L12 11.6l3.68-3.75c1.62-1.77 4.28-1.9 6.02-.25 1.8 1.68 1.7 4.13-.37 6.3C18.7 16.65 12 21 12 21z"/>
            </svg>
            Pawsy
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <ul class="navbar-nav me-auto gap-lg-3">

                <li class="nav-item">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/about}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                        </svg>
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/pets}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M4.5 9A2.5 2.5 0 117 6.5 2.5 2.5 0 014.5 9zm6-3A2.5 2.5 0 1113 3.5 2.5 2.5 0 0110.5 6zm6 3A2.5 2.5 0 1119 6.5 2.5 2.5 0 0116.5 9zM12 11c-3.5 0-6 2.5-6 4.5S8 20 12 20s6-1.5 6-4.5S15.5 11 12 11z"/>
                        </svg>
                        Pets
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/shelters}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M12 3l9 7v11h-6v-6H9v6H3V10l9-7z"/>
                        </svg>
                        Shelters
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated() && hasRole('MANAGER')">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/shelters/pets}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8" />
                            <circle cx="8" cy="9" r="1" fill="white"/>
                            <circle cx="16" cy="9" r="1" fill="white"/>
                            <path d="M6 6l-2-3h4l-2 3zM18 6l2-3h-4l2 3z" fill="#e83e8c"/>
                        </svg>

                        My Pets
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/profile}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" fill="#e83e8c" rx="2"/>
                            <circle cx="12" cy="7" r="3" fill="white"/>
                            <rect x="6" y="12" width="12" height="1" fill="white"/>
                            <rect x="6" y="15" width="12" height="1" fill="white"/>
                            <rect x="6" y="18" width="8" height="1" fill="white"/>
                        </svg>
                        Profile
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/adoptions/my}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" fill="#e83e8c" rx="2"/>

                            <circle cx="9" cy="10" r="2" fill="white"/>
                            <circle cx="7" cy="8" r="1" fill="white"/>
                            <circle cx="11" cy="8" r="1" fill="white"/>
                            <circle cx="6.5" cy="10.5" r="1" fill="white"/>
                            <circle cx="11.5" cy="10.5" r="1" fill="white"/>

                            <rect x="13" y="8" width="5" height="1" fill="white"/>
                            <rect x="13" y="11" width="5" height="1" fill="white"/>

                            <path d="M13 15 l2 2 l3 -3" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        My Requests
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/appointments/my}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" fill="#e83e8c" rx="2"/>
                            <rect x="6" y="7" width="12" height="1.5" fill="white"/>
                            <rect x="8" y="5.5" width="1.5" height="3" fill="white"/>
                            <rect x="14.5" y="5.5" width="1.5" height="3" fill="white"/>
                            <circle cx="8.5" cy="11" r="0.8" fill="white"/>
                            <circle cx="11" cy="11" r="0.8" fill="white"/>
                            <circle cx="13.5" cy="11" r="0.8" fill="white"/>
                            <circle cx="12" cy="15.5" r="3" fill="none" stroke="white" stroke-width="1.2"/>
                            <path d="M12 15.5 L12 13.8" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                            <path d="M12 15.5 L13.5 16.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>

                        My Appointments
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated() && !hasAnyRole('MANAGER', 'ADMIN')">
                    <a class="nav-link fw-medium d-flex align-items-center gap-2" th:href="@{/shelters/apply}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" fill="#e83e8c" rx="2"/>
                            <path d="M6 11 L12 6 L18 11 V18 H6 Z" fill="white"/>
                            <circle cx="12" cy="14" r="1.5" fill="#e83e8c"/>
                            <circle cx="10" cy="12.5" r="0.7" fill="#e83e8c"/>
                            <circle cx="14" cy="12.5" r="0.7" fill="#e83e8c"/>
                            <circle cx="11" cy="11.5" r="0.7" fill="#e83e8c"/>
                            <circle cx="13" cy="11.5" r="0.7" fill="#e83e8c"/>
                        </svg>
                        Become a Manager
                    </a>
                </li>

            </ul>

            <ul class="navbar-nav align-items-center gap-2">

                <li sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-danger px-3 pawsy-btn d-flex align-items-center gap-2" th:href="@{/login}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M10 17l5-5-5-5v3H3v4h7v3zM19 3h-6v2h6v14h-6v2h6a2 2 0 002-2V5a2 2 0 00-2-2z"/>
                        </svg>
                        Login
                    </a>
                </li>

                <li sec:authorize="!isAuthenticated()">
                    <a class="btn btn-danger px-3 pawsy-btn d-flex align-items-center gap-2" th:href="@{/register}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M15 14c2.7 0 5 2.3 5 5v1H4v-1c0-2.7 2.3-5 5-5h6zm-3-2a4 4 0 100-8 4 4 0 000 8z"/>
                        </svg>
                        Register
                    </a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2 fw-medium" data-bs-toggle="dropdown">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-4.4 0-8 3.6-8 8h16c0-4.4-3.6-8-8-8z"/>
                        </svg>
                        <span sec:authentication="name"></span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li class="dropdown-item small text-muted"
                            th:each="auth : ${#authentication.principal.authorities}">

                            <span th:switch="${auth.authority}">

                                <span th:case="'ROLE_ADOPTER'">Adopter</span>
                                <span th:case="'ROLE_MANAGER'">Shelter Manager</span>
                                <span th:case="'ROLE_ADMIN'">Administrator</span>

                            </span>

                        </li>

                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>

            </ul>

        </div>
    </div>
</nav>

</body>
</html>
