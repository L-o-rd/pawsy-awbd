<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Login • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="bg-danger-subtle min-vh-100 d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card border-0 shadow rounded-4">
                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="#e83e8c" viewBox="0 0 24 24">
                                <path d="M4.5 9A2.5 2.5 0 117 6.5 2.5 2.5 0 014.5 9zm6-3A2.5 2.5 0 1113 3.5 2.5 2.5 0 0110.5 6zm6 3A2.5 2.5 0 1119 6.5 2.5 2.5 0 0116.5 9zM12 11c-3.5 0-6 2.5-6 4.5S8 20 12 20s6-1.5 6-4.5S15.5 11 12 11z"/>
                            </svg>

                            <h3 class="fw-semibold mt-3 text-danger-emphasis">Welcome back</h3>
                            <p class="text-muted">Sign in to your Pawsy account</p>

                        </div>

                        <div th:if="${param.error}" class="alert alert-danger">
                            Invalid username or password
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success">
                            You have been logged out
                        </div>

                        <form th:action="@{/login}" method="post">

                            <div class="mb-3">
                                <label for="username" class="form-label fw-medium">Username</label>

                                <div class="input-group">
<span class="input-group-text bg-white">
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
<path d="M12 12c2.7 0 5-2.3 5-5S14.7 2 12 2 7 4.3 7 7s2.3 5 5 5zm0 2c-4.4 0-8 3.6-8 8h16c0-4.4-3.6-8-8-8z"/>
</svg>
</span>

                                    <input id="username"
                                           name="username"
                                           type="text"
                                           class="form-control"
                                           required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-medium">Password</label>

                                <div class="input-group">
<span class="input-group-text bg-white">
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
<path d="M17 8h-1V6a4 4 0 10-8 0v2H7a2 2 0 00-2 2v10h14V10a2 2 0 00-2-2z"/>
</svg>
</span>

                                    <input id="password"
                                           name="password"
                                           type="password"
                                           class="form-control"
                                           required>
                                </div>
                            </div>

                            <button type="submit"
                                    class="btn btn-danger w-100 py-3 pawsy-btn d-flex align-items-center justify-content-center gap-2">

                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
                                    <path d="M10 17l5-5-5-5v3H3v4h7v3z"/>
                                </svg>

                                Login

                            </button>

                        </form>

                        <div class="text-center mt-4">

                            <p class="text-muted mb-1">Don't have an account?</p>

                            <a th:href="@{/register}" class="fw-semibold text-danger text-decoration-none">
                                Create one
                            </a>

                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){
        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );
    });
</script>

</body>
</html>
