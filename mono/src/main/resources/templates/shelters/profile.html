<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title th:text="${shelter.name} + ' • Pawsy'">Shelter</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="bg-danger-subtle py-5">

    <div class="container">

        <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

        <div class="row g-5 align-items-center">

            <!-- ICON / VISUAL -->
            <div class="col-lg-4 text-center">

                <div class="card border-0 shadow rounded-4 p-5">

                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#e83e8c" viewBox="0 0 24 24">
                        <path d="M12 3l9 7v11h-6v-6H9v6H3V10l9-7z"/>
                    </svg>

                </div>

            </div>

            <!-- DETAILS -->
            <div class="col-lg-8">

                <h2 class="fw-bold text-danger-emphasis mb-3"
                    th:text="${shelter.name}">
                </h2>

                <p class="text-muted mb-4"
                   th:text="${shelter.location}">
                </p>

                <!-- INFO CARDS -->
                <div class="row g-3">

                    <div class="col-md-4">

                        <div class="card border-0 shadow-sm rounded-4 p-3 text-center">

                            <div class="fw-semibold" th:text="${shelter.email}"></div>
                            <div class="small text-muted">Email</div>

                        </div>

                    </div>

                    <div class="col-md-4">

                        <div class="card border-0 shadow-sm rounded-4 p-3 text-center">

                            <div class="fw-semibold" th:text="${shelter.phone}"></div>
                            <div class="small text-muted">Phone</div>

                        </div>

                    </div>

                    <div class="col-md-4">

                        <div class="card border-0 shadow-sm rounded-4 p-3 text-center">

                            <div class="fw-semibold" th:text="${shelter.manager}"></div>
                            <div class="small text-muted">Manager</div>

                        </div>

                    </div>

                </div>

            </div>

            <div class="mt-4">

                <!-- NEW REVIEW -->
                <div th:if="${userReview == null}">

                    <button class="btn btn-danger pawsy-btn"
                            data-bs-toggle="modal"
                            data-bs-target="#reviewModal">
                        Leave a Review
                    </button>

                </div>

                <!-- EDIT REVIEW -->
                <div th:if="${userReview != null}">

                    <button class="btn btn-outline-danger pawsy-btn"
                            data-bs-toggle="modal"
                            data-bs-target="#reviewModal">
                        Edit Your Review
                    </button>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- PETS -->
<section class="py-5">

    <div class="container">

        <h4 class="fw-semibold text-danger-emphasis mb-4">
            Pets Available for Adoption
        </h4>

        <!-- EMPTY -->
        <div th:if="${petsPage.totalElements == 0}" class="text-center py-5">

            <div class="card border-0 shadow-sm rounded-4 p-5">

                <h5 class="fw-semibold text-danger-emphasis">
                    No pets available right now
                </h5>

                <p class="text-muted">
                    Check back later for new arrivals.
                </p>

            </div>

        </div>

        <!-- GRID -->
        <div class="row g-4" th:if="${petsPage.totalElements > 0}">

            <div class="col-md-4"
                 th:each="p : ${petsPage.content}">

                <div class="card border-0 shadow-sm rounded-4 h-100 pet-card">

                    <img th:src="@{${p.photo}}"
                         class="card-img-top"
                         style="height:180px;object-fit:cover" alt="Pet Photo">

                    <div class="card-body text-center">

                        <h6 class="fw-semibold" th:text="${p.name}"></h6>

                        <p class="small text-muted mb-3"
                           th:text="${p.species}">
                        </p>

                        <a th:href="@{/pets/{id}(id=${p.id})}"
                           class="btn btn-outline-danger btn-sm pawsy-btn">
                            View
                        </a>

                    </div>

                </div>

            </div>

        </div>

        <!-- PAGINATION -->
        <ul class="pagination justify-content-center mt-5"
            th:if="${petsPage.totalPages > 0}">

            <li class="page-item" th:classappend="${petsPage.first}? 'disabled'">
                <a class="page-link"
                   th:href="@{/shelters/{id}(id=${shelter.id}, page=${petsPage.number - 1})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, petsPage.totalPages - 1)}"
                th:classappend="${i == petsPage.number}? 'active'">

                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/shelters/{id}(id=${shelter.id}, page=${i})}">
                </a>

            </li>

            <li class="page-item" th:classappend="${petsPage.last}? 'disabled'">
                <a class="page-link"
                   th:href="@{/shelters/{id}(id=${shelter.id}, page=${petsPage.number+1})}">
                    Next
                </a>
            </li>

        </ul>

    </div>

</section>

<section class="py-5">

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h4 class="fw-semibold text-danger-emphasis">
                What people say
            </h4>

            <!-- SORT -->
            <form method="get"
                  th:action="@{/shelters/{id}(id=${shelter.id})}">

                <label>
                    <select name="sort"
                            class="form-select form-select-sm"
                            onchange="this.form.submit()">

                        <option value="" selected disabled>Choose...</option>
                        <option value="createdAt">Newest</option>
                        <option value="rating">Highest Rating</option>

                    </select>
                </label>

            </form>

        </div>

        <!-- EMPTY -->
        <div th:if="${reviewsPage.totalElements == 0}"
             class="text-muted">
            No reviews yet.
        </div>

        <!-- LIST -->
        <div th:if="${reviewsPage.totalElements > 0}">

            <div th:each="r : ${reviewsPage.content}"
                 class="mb-3">

                <div class="card border-0 shadow-sm rounded-4 p-3">

                    <div class="d-flex justify-content-between">

                        <div class="fw-semibold"
                             th:text="${r.username}"></div>

                        <small class="text-muted"
                               th:text="${#temporals.format(r.createdAt, 'dd MMM yyyy')}"></small>

                        <div th:if="${r.editedAt != null}">
                            <small class="text-muted"
                                   th:text="${#temporals.format(r.editedAt, 'dd MMM yyyy hh:mm')}"></small>
                        </div>

                    </div>

                    <!-- STARS -->
                    <div class="mb-2 mt-1">
                        <span th:each="i : ${#numbers.sequence(1, 5)}">
                            <svg width="16" height="16"
                                 th:attr="fill=${i <= r.rating} ? '#e83e8c' : '#ddd'"
                                 viewBox="0 0 24 24">
                                <path d="M12 17.3l6.2 3.7-1.6-7 5.4-4.7-7.1-.6L12 2 9.1 8.7l-7.1.6 5.4 4.7-1.6 7z"/>
                            </svg>
                        </span>
                    </div>

                    <p class="text-muted small mb-0"
                       th:text="${r.comment}">
                    </p>

                </div>

            </div>

        </div>

        <!-- PAGINATION -->
        <ul class="pagination justify-content-center mt-4"
            th:if="${reviewsPage.totalPages > 0}">

            <li class="page-item"
                th:classappend="${reviewsPage.first}? 'disabled'">

                <a class="page-link"
                   th:href="@{/shelters/{id}(id=${shelter.id}, page=${reviewsPage.number - 1})}">
                    Previous
                </a>

            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, reviewsPage.totalPages - 1)}"
                th:classappend="${i == reviewsPage.number}? 'active'">

                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/shelters/{id}(id=${shelter.id}, page=${i})}">
                </a>

            </li>

            <li class="page-item"
                th:classappend="${reviewsPage.last}? 'disabled'">

                <a class="page-link"
                   th:href="@{/shelters/{id}(id=${shelter.id}, page=${reviewsPage.number+1})}">
                    Next
                </a>

            </li>

        </ul>

    </div>

</section>

<div class="modal fade" id="reviewModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content rounded-4 border-0">

            <form th:action="@{/shelters/{id}/review(id=${shelter.id})}"
                  method="post"
                  th:object="${reviewForm}">

                <div class="modal-header">
                    <h5 class="modal-title">Your Review</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- RATING -->
                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <div id="starRating" class="d-flex gap-1">

                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                              class="star"
                              th:attr="data-value=${i}">

                            <svg width="28" height="28" viewBox="0 0 24 24" fill="#ddd">
                                <path d="M12 17.3l6.2 3.7-1.6-7 5.4-4.7-7.1-.6L12 2 9.1 8.7l-7.1.6 5.4 4.7-1.6 7z"/>
                            </svg>

                        </span>

                        </div>

                        <!-- hidden input -->
                        <input type="hidden" th:field="*{rating}" id="ratingInput">

                        <div class="text-danger small" th:errors="*{rating}"></div>
                    </div>

                    <!-- MESSAGE -->
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea id="message" class="form-control"
                                  th:field="*{comment}"
                                  rows="3"></textarea>
                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-danger pawsy-btn">
                        Submit Review
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){

        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );

        $(".pet-card").hover(
            function(){ $(this).stop().animate({marginTop:"-6px"},150); },
            function(){ $(this).stop().animate({marginTop:"0px"},150); }
        );

    });

    $(function(){

        let selectedRating = 0;

        $(".star").on("click", function(){

            selectedRating = $(this).data("value");
            $("#ratingInput").val(selectedRating);

            $(".star svg").attr("fill", "#ddd");

            $(".star").each(function(){
                if ($(this).data("value") <= selectedRating) {
                    $(this).find("svg").attr("fill", "#e83e8c");
                }
            });

        });

    });
</script>

</body>
</html>
