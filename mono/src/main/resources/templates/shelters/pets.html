<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>My Pets • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="py-5 bg-danger-subtle">

    <div class="container">

        <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <h3 class="fw-bold text-danger-emphasis mb-0">
                My Pets
            </h3>

            <div class="row g-3 mb-4">
                <div class="col">
                    <a th:href="@{/pets/create}"
                       class="btn btn-danger pawsy-btn d-flex align-items-center gap-2">

                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/>
                        </svg>

                        Add Pet
                    </a>
                </div>

                <div class="col">
                    <a th:href="@{/shelters/adoptions}"
                       class="btn btn-danger pawsy-btn d-flex align-items-center gap-2">

                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/>
                        </svg>

                        Manage Requests
                    </a>
                </div>
            </div>

        </div>

        <!-- EMPTY STATE -->
        <div th:if="${petsPage.totalElements == 0}" class="text-center py-5">

            <div class="card border-0 shadow-sm rounded-4 p-5">

                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#e83e8c" viewBox="0 0 24 24">
                    <path d="M12 2a5 5 0 015 5c0 2.8-2.2 5-5 5s-5-2.2-5-5 2.2-5 5-5zM4 20c0-4.4 3.6-8 8-8s8 3.6 8 8H4z"/>
                </svg>

                <h5 class="fw-semibold mt-3 text-danger-emphasis">
                    No pets yet
                </h5>

                <p class="text-muted mb-4">
                    Start by adding your first pet.
                </p>

                <a th:href="@{/pets/create}" class="btn btn-danger pawsy-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                        <path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/>
                    </svg>

                    Add Pet
                </a>

            </div>

        </div>

        <!-- PET GRID -->
        <div class="row g-4" th:if="${petsPage.totalElements > 0}">

            <div class="col-md-4"
                 th:each="pet : ${petsPage.content}">

                <div class="card border-0 shadow-sm rounded-4 h-100 pet-card">

                    <img th:src="@{${pet.photo}}"
                         class="card-img-top"
                         style="height:180px;object-fit:cover" alt="Pet Photo">

                    <div class="card-body text-center">

                        <h6 class="fw-semibold" th:text="${pet.name}"></h6>

                        <p class="small text-muted mb-3">
                            <span th:text="${pet.species}"></span>
                        </p>

                        <!-- ACTIONS -->
                        <div class="d-flex gap-2 justify-content-center">

                            <a th:href="@{/pets/{id}(id=${pet.id})}"
                               class="btn btn-outline-secondary btn-sm">
                                View
                            </a>

                            <a th:href="@{/pets/{id}/edit(id=${pet.id})}"
                               class="btn btn-outline-danger btn-sm">
                                Edit
                            </a>

                            <!-- DELETE -->
                            <button class="btn btn-danger btn-sm pawsy-btn"
                                    data-bs-toggle="modal"
                                    th:attr="data-bs-target='#deleteModal-' + ${pet.id}">
                                Delete
                            </button>

                        </div>

                    </div>

                </div>

                <!-- DELETE MODAL -->
                <div class="modal fade"
                     th:id="'deleteModal-' + ${pet.id}"
                     tabindex="-1">

                    <div class="modal-dialog modal-dialog-centered">

                        <div class="modal-content rounded-4">

                            <div class="modal-body text-center p-4">

                                <h5 class="fw-semibold mb-3 text-danger-emphasis">
                                    Delete this pet?
                                </h5>

                                <p class="text-muted mb-4">
                                    This action cannot be undone.
                                </p>

                                <form th:action="@{/pets/{id}/delete(id=${pet.id})}"
                                      method="post">

                                    <button type="button"
                                            class="btn btn-outline-secondary me-2"
                                            data-bs-dismiss="modal">
                                        Cancel
                                    </button>

                                    <button type="submit"
                                            class="btn btn-danger">
                                        Delete
                                    </button>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- PAGINATION -->
        <ul class="pagination justify-content-center mt-5"
            th:if="${petsPage.totalPages > 0}">

            <li class="page-item" th:classappend="${petsPage.first}? 'disabled'">
                <a class="page-link"
                   th:href="@{/shelters/pets(page=${petsPage.number - 1})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, petsPage.totalPages - 1)}"
                th:classappend="${i == petsPage.number}? 'active'">

                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/shelters/pets(page=${i})}">
                </a>

            </li>

            <li class="page-item" th:classappend="${petsPage.last}? 'disabled'">
                <a class="page-link"
                   th:href="@{/shelters/pets(page=${petsPage.number+1})}">
                    Next
                </a>
            </li>

        </ul>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){

        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );

        $(".pet-card").hover(
            function(){ $(this).stop().animate({marginTop:"-6px"},150); },
            function(){ $(this).stop().animate({marginTop:"0px"},150); }
        );

    });
</script>

</body>
</html>
