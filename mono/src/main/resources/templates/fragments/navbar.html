<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">

<body>
    <div class="navbar">

        <div class="logo">
            <img class="icon-large" src="https://cdn-icons-png.flaticon.com/512/8277/8277564.png" alt="Paws">
            <a class="pawsy-link" th:href="@{/}"><h2>Pawsy</h2></a>
        </div>

        <div class="nav-right">
            <div sec:authorize="isAnonymous()" class="nav-buttons">
                <a class="nav-btn" th:href="@{/login}">
                    <img class="icon" src="https://cdn-icons-png.flaticon.com/512/5264/5264565.png" alt="Login">
                    Login
                </a>

                <a class="nav-btn" th:href="@{/register}">
                    <img class="icon" src="https://cdn-icons-png.flaticon.com/512/16206/16206813.png" alt="Register">
                    Register
                </a>

            </div>

            <div sec:authorize="isAuthenticated()" class="user-panel">
                <div class="user-info">
                    <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="User">
                    <span class="username">
                        @<span sec:authentication="name"></span>
                    </span>

                    <span class="roles"
                          sec:authentication="principal.authorities">
                    </span>
                </div>

                <form th:action="@{/logout}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <button class="nav-btn logout">
                        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1828/1828479.png" alt="Register">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
