<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Add Pet • Pawsy</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="py-5 bg-danger-subtle">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body p-5">

                        <!-- HEADER -->
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-danger-emphasis mb-2">
                                Add a New Pet
                            </h3>
                            <p class="text-muted">
                                Help a pet find a loving home 💗
                            </p>
                        </div>

                        <!-- SUCCESS / ERROR -->
                        <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

                        <!-- FORM -->
                        <form th:action="@{/pets/create}" method="post" th:object="${pet}">

                            <!-- NAME -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Pet Name</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control rounded-3" required>
                                <div class="text-danger small" th:errors="*{name}"></div>
                            </div>

                            <!-- PHOTO -->
                            <div class="mb-4">
                                <label for="photoUrl" class="form-label">Photo URL</label>
                                <input type="text" id="photoUrl" th:field="*{photo}" class="form-control rounded-3">
                                <div class="text-danger small" th:errors="*{photo}"></div>

                                <!-- PREVIEW -->
                                <div class="mt-3 text-center">
                                    <img id="previewImage"
                                         src="/images/404.png"
                                         class="rounded-4 shadow-sm"
                                         style="height:180px;object-fit:cover;" alt="Pet Photo">
                                </div>
                            </div>

                            <!-- BASIC INFO -->
                            <div class="row g-3 mb-3">

                                <div class="col-md-4">
                                    <label for="species" class="form-label">Species</label>
                                    <input type="text" id="species" th:field="*{species}" class="form-control rounded-3" required>
                                    <div class="text-danger small" th:errors="*{species}"></div>
                                </div>

                                <div class="col-md-4">
                                    <label for="sex" class="form-label">Sex</label>
                                    <select id="sex" th:field="*{sex}" class="form-select rounded-3" required>
                                        <option value="">Select</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="None">None</option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label for="age" class="form-label">Age</label>
                                    <input type="number" id="age" th:field="*{age}" class="form-control rounded-3" required>
                                    <div class="text-danger small" th:errors="*{age}"></div>
                                </div>

                            </div>

                            <!-- DESCRIPTION -->
                            <div class="mb-4">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description"
                                          th:field="*{description}"
                                          rows="4"
                                          class="form-control rounded-3" required></textarea>
                                <div class="text-danger small" th:errors="*{description}"></div>
                            </div>

                            <!-- SUBMIT -->
                            <button type="submit"
                                    class="btn btn-danger w-100 py-3 pawsy-btn d-flex align-items-center justify-content-center gap-2">

                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24">
                                    <path d="M12 5v14M5 12h14"/>
                                </svg>

                                Add Pet

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){

        // Hover animation
        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );

        // Image preview
        $("#photoUrl").on("input", function(){
            const url = $(this).val();
            $("#previewImage").attr("src", url || "/images/404.png");
        });

    });
</script>

</body>
</html>
