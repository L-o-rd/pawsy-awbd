<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Edit Pet • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="py-5 bg-danger-subtle">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body p-5">

                        <!-- HEADER -->
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-danger-emphasis">Edit Pet</h3>
                            <p class="text-muted">Update pet details</p>
                        </div>

                        <!-- FORM -->
                        <form th:action="@{/pets/{id}/edit(id=${petId})}"
                              method="post"
                              th:object="${pet}">

                            <!-- NAME -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control rounded-3" required>
                                <div class="text-danger small" th:errors="*{name}"></div>
                            </div>

                            <!-- PHOTO -->
                            <div class="mb-4">
                                <label for="photoUrl" class="form-label">Photo URL</label>
                                <input type="text" th:field="*{photo}" id="photoUrl" class="form-control rounded-3">

                                <div class="mt-3 text-center">
                                    <img id="previewImage"
                                         th:src="@{${pet.photo}}"
                                         class="rounded-4 shadow-sm"
                                         style="height:180px;object-fit:cover;" alt="Pet Photo">
                                </div>
                            </div>

                            <!-- BASIC -->
                            <div class="row g-3 mb-3">

                                <div class="col-md-4">
                                    <label for="species" class="form-label">Species</label>
                                    <select id="species" th:field="*{species}" class="form-select rounded-3">
                                        <option value="Dog">Dog</option>
                                        <option value="Cat">Cat</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label for="sex" class="form-label">Sex</label>
                                    <select id="sex" th:field="*{sex}" class="form-select rounded-3">
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="None">None</option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label for="age" class="form-label">Age</label>
                                    <input id="age" type="number" th:field="*{age}" class="form-control rounded-3">
                                    <div class="text-danger small" th:errors="*{age}"></div>
                                </div>

                            </div>

                            <!-- DESCRIPTION -->
                            <div class="mb-4">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" th:field="*{description}"
                                          rows="4"
                                          class="form-control rounded-3" required></textarea>
                                <div class="text-danger small" th:errors="*{description}"></div>
                            </div>

                            <!-- ACTIONS -->
                            <div class="d-flex gap-3">

                                <a th:href="@{/pets/{id}(id=${petId})}"
                                   class="btn btn-outline-secondary w-50">
                                    Cancel
                                </a>

                                <button type="submit"
                                        class="btn btn-danger w-50 pawsy-btn">
                                    Save
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){

        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );

        $("#photoUrl").on("input", function(){
            $("#previewImage").attr("src", $(this).val());
        });

    });
</script>

</body>
</html>
