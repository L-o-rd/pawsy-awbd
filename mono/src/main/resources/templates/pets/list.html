<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Pets • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="bg-danger-subtle py-5">

    <div class="container">

        <div class="text-center mb-5">
            <h2 class="fw-semibold text-danger-emphasis">Find your new best friend</h2>
            <p class="text-muted">Browse pets currently available for adoption</p>
        </div>

        <div class="card shadow-sm border-0 rounded-4 mb-4">

            <div class="card-body">

                <form method="get" th:action="@{/pets}">

                    <div class="row g-3">

                        <div class="col-md-3">

                            <label for="name" class="form-label">Pet Name</label>

                            <div class="input-group">

<span class="input-group-text bg-white">

<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
<path d="M15.5 14h-.8l-.3-.3A6.5 6.5 0 1014 15.5l.3.3v.8L20 21.5 21.5 20l-5.5-6zM10 15a5 5 0 110-10 5 5 0 010 10z"/>
</svg>

</span>

                                <input
                                        id="name"
                                        name="name"
                                        class="form-control"
                                        placeholder="Search name"
                                        th:value="${param.name}">

                            </div>
                        </div>

                        <div class="col-md-2">

                            <label for="species" class="form-label">Species</label>

                            <select id="species" name="species" class="form-select">

                                <option value="">All</option>
                                <option value="DOG">Dog</option>
                                <option value="CAT">Cat</option>
                                <option value="OTHER">Other</option>

                            </select>

                        </div>

                        <div class="col-md-2">

                            <label for="sex" class="form-label">Sex</label>

                            <select id="sex" name="sex" class="form-select">

                                <option value="">Any</option>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>

                            </select>

                        </div>

                        <div class="col-md-2">

                            <label for="shelter" class="form-label">Shelter</label>

                            <select id="shelter" name="shelter" class="form-select">

                                <option value="">All Shelters</option>

                                <option
                                        th:each="s : ${shelters}"
                                        th:value="${s.id}"
                                        th:text="${s.name}">
                                    Shelter
                                </option>

                            </select>

                        </div>

                        <div class="col-md-2">

                            <label for="sort" class="form-label">Sort By</label>

                            <select id="sort" name="sort" class="form-select">

                                <option value="name">Name</option>
                                <option value="age">Age</option>
                                <option value="species">Species</option>

                            </select>

                        </div>

                        <div class="col-md-1 d-grid">

                            <label class="form-label invisible">Search</label>

                            <button
                                    type="submit"
                                    class="btn btn-danger pawsy-btn d-flex align-items-center justify-content-center">

                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
                                    <path d="M21 20l-5.6-5.6a7 7 0 10-1.4 1.4L20 21zM10 16a6 6 0 110-12 6 6 0 010 12z"/>
                                </svg>

                            </button>

                        </div>

                    </div>

                </form>

            </div>
        </div>

        <div class="row g-4">

            <div
                    class="col-md-6 col-lg-4 col-xl-3"
                    th:each="pet : ${petsPage.content}">

                <div class="card h-100 border-0 shadow-sm rounded-4 pet-card">

                    <img
                            th:src="@{${pet.photo}}"
                            class="card-img-top rounded-top-4 bg-light pet-photo"
                            style="height:220px;object-fit:cover"
                            alt="Pet Profile">

                    <div class="card-body d-flex flex-column">

                        <h5 class="fw-semibold text-danger-emphasis" th:text="${pet.name}"></h5>

                        <p class="text-muted small mb-1">

                            <span th:text="${pet.species}"></span>
                            •
                            <span th:text="${pet.age}"></span> yrs

                        </p>

                        <p class="small text-muted flex-grow-1"
                           th:text="${pet.description}">
                        </p>

                        <div class="d-flex justify-content-between align-items-center mt-2">

                            <span class="badge bg-success" th:text="${pet.status}"></span>

                            <span class="text-muted small" th:text="${pet.sex}"></span>

                        </div>

                        <a
                                th:href="@{/pets/{id}(id=${pet.id})}"
                                class="btn btn-outline-danger mt-3 pawsy-btn d-flex align-items-center justify-content-center gap-2">

                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#dc3545" viewBox="0 0 24 24">
                                <path d="M12 5a7 7 0 017 7c0 5-7 9-7 9s-7-4-7-9a7 7 0 017-7z"/>
                            </svg>

                            View

                        </a>

                    </div>

                </div>

            </div>

        </div>

        <nav class="mt-5">

            <ul class="pagination justify-content-center"
                th:if="${petsPage.totalPages > 0}">

                <li
                        class="page-item"
                        th:classappend="${petsPage.first}? 'disabled'">

                    <a
                            class="page-link"
                            th:href="@{/pets(page=${petsPage.number - 1},size=${petsPage.size})}">
                        Previous
                    </a>

                </li>

                <li
                        class="page-item"
                        th:each="i : ${#numbers.sequence(0,petsPage.totalPages - 1)}"
                        th:classappend="${i==petsPage.number}? 'active'">

                    <a
                            class="page-link"
                            th:text="${i+1}"
                            th:href="@{/pets(page=${i},size=${petsPage.size})}">
                        1
                    </a>

                </li>

                <li
                        class="page-item"
                        th:classappend="${petsPage.last}? 'disabled'">

                    <a
                            class="page-link"
                            th:href="@{/pets(page=${petsPage.number+1},size=${petsPage.size})}">
                        Next
                    </a>

                </li>

            </ul>

        </nav>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){
        $(".pet-photo").on("error", function(){
            $(this).attr("src", "/images/404.png");
        });
    });

    $(function(){

        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );

        $(".pet-card").hover(
            function(){ $(this).stop().animate({marginTop:"-6px"},150); },
            function(){ $(this).stop().animate({marginTop:"0px"},150); }
        );

    });

</script>

</body>
</html>
