<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>My Appointments • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="py-5 bg-danger-subtle">

    <div class="container">

        <h3 class="fw-bold text-danger-emphasis mb-4">
            My Appointments
        </h3>

        <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(appointments)}" class="text-center py-5">

            <div class="card border-0 shadow-sm rounded-4 p-5">

                <h5 class="fw-semibold text-danger-emphasis">
                    No appointments yet
                </h5>

                <p class="text-muted mb-4">
                    Schedule a visit to meet your future pet.
                </p>

                <a th:href="@{/pets}" class="btn btn-danger pawsy-btn">
                    Browse Pets
                </a>

            </div>

        </div>

        <!-- LIST -->
        <div class="row g-4" th:if="${!#lists.isEmpty(appointments)}">

            <div class="col-md-6"
                 th:each="a : ${appointments}">

                <div class="card border-0 shadow-sm rounded-4 h-100">

                    <div class="row g-0 align-items-center">

                        <!-- IMAGE -->
                        <div class="col-4">
                            <img th:src="@{${a.pet.photo}}"
                                 class="w-100 rounded-start-4"
                                 style="height:100%;object-fit:cover" alt="Pet Photo">
                        </div>

                        <!-- INFO -->
                        <div class="col-8">

                            <div class="card-body">

                                <h6 class="fw-semibold mb-1"
                                    th:text="${a.pet.name}">
                                </h6>

                                <p class="small text-muted mb-1">
                                    Appointment:
                                    <strong th:text="${#temporals.format(a.appointmentDate, 'dd MMM yyyy')}"></strong>
                                </p>

                                <p class="small text-muted mb-2">
                                    Requested on:
                                    <span th:text="${#temporals.format(a.scheduledAtDate, 'dd MMM yyyy')}"></span>
                                </p>

                                <!-- STATUS -->
                                <span class="badge"
                                      th:classappend="
                                      ${a.status == 'Ongoing'} ? 'bg-warning' :
                                      (${a.status == 'Done'} ? 'bg-success' : 'bg-secondary')"
                                      th:text="${a.status}">
                                </span>

                                <!-- ACTION -->
                                <div class="mt-3 d-flex gap-2">

                                    <a th:href="@{/pets/{id}(id=${a.pet.id})}"
                                       class="btn btn-outline-danger btn-sm pawsy-btn">
                                        View
                                    </a>

                                    <!-- CANCEL -->
                                    <form th:if="${a.status == 'Ongoing'}"
                                          th:action="@{/appointments/{id}/cancel(id=${a.id})}"
                                          method="post"
                                          onsubmit="return confirm('Cancel this appointment?');">

                                        <button class="btn btn-outline-secondary btn-sm pawsy-btn">
                                            Cancel
                                        </button>

                                    </form>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){
        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );
    });
</script>

</body>
</html>
