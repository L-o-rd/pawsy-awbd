logging.level.org.springframework.web.client.RestClient=DEBUG
spring.application.name=pet-service
server.port=8080

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${PET_DB_NAME}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.username=${MYSQL_USER}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

adoption.service.url=${ADOPTION_SERVICE_URL}
user.service.url=${USER_SERVICE_URL}
