logging.level.org.springframework.web.client.RestClient=DEBUG
spring.application.name=user-service
server.port=8080

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${USER_DB_NAME}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.username=${MYSQL_USER}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

adoption.service.url=${ADOPTION_SERVICE_URL}
pet.service.url=${PET_SERVICE_URL}
