<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Access Denied • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="py-5 bg-danger-subtle min-vh-100 d-flex align-items-center">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6 text-center">

                <div class="card border-0 shadow-sm rounded-4 p-5">

                    <!-- ICON -->
                    <div class="mb-4">

                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#e83e8c" viewBox="0 0 24 24">
                            <path d="M12 2a5 5 0 015 5c0 2.8-2.2 5-5 5s-5-2.2-5-5 2.2-5 5-5zM4 20c0-4.4 3.6-8 8-8s8 3.6 8 8H4z"/>
                        </svg>

                    </div>

                    <!-- TITLE -->
                    <h2 class="fw-bold text-danger-emphasis mb-3">
                        Access Denied
                    </h2>

                    <!-- MESSAGE -->
                    <p class="text-muted mb-4">
                        You don’t have permission to access this page.
                        This area is reserved for shelter managers.
                    </p>

                    <!-- ACTIONS -->
                    <div class="d-flex gap-3 justify-content-center flex-wrap">

                        <a th:href="@{/}"
                           class="btn btn-outline-danger px-4 pawsy-btn d-flex align-items-center gap-2">

                            <!-- HOME ICON -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#e83e8c" viewBox="0 0 24 24">
                                <path d="M12 3l9 7v11h-6v-6H9v6H3V10l9-7z"/>
                            </svg>

                            Home
                        </a>

                        <a th:href="@{/pets}"
                           class="btn btn-danger px-4 pawsy-btn d-flex align-items-center gap-2">

                            <!-- PAW ICON -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
                                <path d="M12 2a5 5 0 015 5c0 2.8-2.2 5-5 5s-5-2.2-5-5 2.2-5 5-5zM4 20c0-4.4 3.6-8 8-8s8 3.6 8 8H4z"/>
                            </svg>

                            Browse Pets
                        </a>

                    </div>

                </div>

                <!-- SMALL NOTE -->
                <p class="text-muted small mt-4">
                    If you believe this is a mistake, please contact support.
                </p>

            </div>

        </div>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){

        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );

    });
</script>

</body>
</html>
