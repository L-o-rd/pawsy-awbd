<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Adoption Requests • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="py-5 bg-danger-subtle">

    <div class="container">

        <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

        <h3 class="fw-bold text-danger-emphasis mb-4">
            Adoption Requests
        </h3>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(requests)}" class="text-center py-5">

            <div class="card border-0 shadow-sm rounded-4 p-5">
                <h5 class="fw-semibold text-danger-emphasis">
                    No requests yet
                </h5>
                <p class="text-muted">
                    Adoption requests will appear here.
                </p>
            </div>

        </div>

        <!-- LIST -->
        <div class="row g-4" th:if="${!#lists.isEmpty(requests)}">

            <div class="col-md-6"
                 th:each="r : ${requests}">

                <div class="card border-0 shadow-sm rounded-4 h-100">

                    <div class="row g-0 align-items-center">

                        <!-- PET IMAGE -->
                        <div class="col-4">
                            <img th:src="@{${r.pet.photo}}"
                                 style="height:100%;object-fit:cover"
                                 class="w-100 rounded-start-4" alt="Pet Photo">
                        </div>

                        <!-- INFO -->
                        <div class="col-8">

                            <div class="card-body">

                                <h6 class="fw-semibold mb-1"
                                    th:text="${r.pet.name}">
                                </h6>

                                <p class="small text-muted mb-2">
                                    Requested by
                                    <strong th:text="${r.adopterName}"></strong>
                                </p>

                                <p class="small text-muted mb-3">
                                    <span th:text="${#temporals.format(r.requestDate, 'dd MMM yyyy')}"></span>
                                </p>

                                <!-- STATUS -->
                                <span class="badge mb-3"
                                      th:classappend="
                                      ${r.status == 'Pending'} ? 'bg-warning' :
                                      (${r.status == 'Approved'} ? 'bg-success' : 'bg-secondary')"
                                      th:text="${r.status}">
                                </span>

                                <!-- ACTIONS -->
                                <div th:if="${r.status == 'Pending'}"
                                     class="d-flex gap-2">

                                    <!-- APPROVE -->
                                    <form th:action="@{/shelters/adoptions/{id}/approve(id=${r.id})}"
                                          method="post">

                                        <button class="btn btn-success btn-sm pawsy-btn">
                                            Approve
                                        </button>

                                    </form>

                                    <!-- REJECT -->
                                    <form th:action="@{/shelters/adoptions/{id}/reject(id=${r.id})}"
                                          method="post">

                                        <button class="btn btn-outline-secondary btn-sm pawsy-btn">
                                            Reject
                                        </button>

                                    </form>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){
        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );
    });
</script>

</body>
</html>
