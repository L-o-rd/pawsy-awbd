<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Shelters • Pawsy</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
</head>

<body class="bg-body-tertiary">

<div th:replace="~{layout/navbar :: navbar}"></div>

<section class="py-5 bg-danger-subtle">

    <div class="container">

        <!-- HEADER -->
        <div class="text-center mb-5">
            <h2 class="fw-bold text-danger-emphasis">Shelters</h2>
            <p class="text-muted">Find trusted shelters near you</p>
        </div>

        <!-- FILTERS -->
        <form method="get" th:action="@{/shelters}" class="row g-3 mb-4 align-items-end">

            <div class="col-md-4">
                <label for="name" class="form-label">Shelter Name</label>
                <input type="text"
                       id="name"
                       name="name"
                       th:value="${name}"
                       placeholder="Search by name"
                       class="form-control rounded-3">
            </div>

            <div class="col-md-4">
                <label for="location" class="form-label">Shelter Location</label>
                <input type="text"
                       id="location"
                       name="location"
                       th:value="${location}"
                       placeholder="Location"
                       class="form-control rounded-3">
            </div>

            <div class="col-md-2">
                <label for="sort" class="form-label">Shelter Sort</label>
                <select id="sort" name="sort" class="form-select rounded-3">
                    <option value="name" th:selected="${sort == 'name'}">Name</option>
                    <option value="location" th:selected="${sort == 'location'}">Location</option>
                </select>
            </div>

            <div class="col-md-2">
                <button class="btn btn-danger w-100 pawsy-btn">Search</button>
            </div>

        </form>

        <!-- EMPTY STATE -->
        <div th:if="${sheltersPage.totalElements == 0}" class="text-center py-5">

            <div class="card border-0 shadow-sm rounded-4 p-5">

                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#e83e8c" viewBox="0 0 24 24">
                    <path d="M12 3l9 7v11h-6v-6H9v6H3V10l9-7z"/>
                </svg>

                <h5 class="fw-semibold mt-3 text-danger-emphasis">
                    No shelters found
                </h5>

                <p class="text-muted">
                    Try adjusting your search filters.
                </p>

            </div>

        </div>

        <!-- GRID -->
        <div class="row g-4" th:if="${sheltersPage.totalElements > 0}">

            <div class="col-md-4"
                 th:each="s : ${sheltersPage.content}">

                <div class="card border-0 shadow-sm rounded-4 h-100 shelter-card">

                    <div class="card-body text-center p-4">

                        <h5 class="fw-semibold text-danger-emphasis mb-2"
                            th:text="${s.name}">
                        </h5>

                        <p class="text-muted small mb-3"
                           th:text="${s.location}">
                        </p>

                        <div class="small text-muted mb-2">
                            <strong>Email:</strong>
                            <span th:text="${s.email}"></span>
                        </div>

                        <div class="small text-muted mb-2">
                            <strong>Phone:</strong>
                            <span th:text="${s.phone}"></span>
                        </div>

                        <div class="small text-muted mb-3">
                            <strong>Manager:</strong>
                            <span th:text="${s.manager}"></span>
                        </div>

                        <a th:href="@{/shelters/{id}(id=${s.id})}"
                           class="btn btn-outline-danger btn-sm pawsy-btn">
                            View
                        </a>

                    </div>

                </div>

            </div>

        </div>

        <!-- PAGINATION -->
        <ul class="pagination justify-content-center mt-5"
            th:if="${sheltersPage.totalPages > 0}">

            <li class="page-item" th:classappend="${sheltersPage.first}? 'disabled'">
                <a class="page-link"
                   th:href="@{/shelters(page=${sheltersPage.number - 1},name=${name},location=${location},sort=${sort})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, sheltersPage.totalPages - 1)}"
                th:classappend="${i == sheltersPage.number}? 'active'">

                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/shelters(page=${i},name=${name},location=${location},sort=${sort})}">
                </a>

            </li>

            <li class="page-item" th:classappend="${sheltersPage.last}? 'disabled'">
                <a class="page-link"
                   th:href="@{/shelters(page=${sheltersPage.number + 1},name=${name},location=${location},sort=${sort})}">
                    Next
                </a>
            </li>

        </ul>

    </div>

</section>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<script>
    $(function(){

        $(".pawsy-btn").hover(
            function(){ $(this).stop().animate({marginTop:"-3px"},120); },
            function(){ $(this).stop().animate({marginTop:"0px"},120); }
        );

        $(".shelter-card").hover(
            function(){ $(this).stop().animate({marginTop:"-6px"},150); },
            function(){ $(this).stop().animate({marginTop:"0px"},150); }
        );

    });
</script>

</body>
</html>
